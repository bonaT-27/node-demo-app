name: CI/CD Pipeline

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Updated to v4 for Node 24 support

      - name: Setup Node
        uses: actions/setup-node@v4  # Updated to v4 for Node 24 support
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma Generate (with dummy URL)
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Build app
        run: npm run build
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"